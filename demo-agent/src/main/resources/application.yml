# Spring AI Alibaba AgentScope 应用配置 - DeepSeek 模型
server:
  port: 8080

spring:
  application:
    name: demo-agent

  # AI 配置 - DeepSeek (OpenAI Compatible)
  ai:
    openai:
      # DeepSeek API Key（启动前必须设置环境变量 DEEPSEEK_API_KEY）
      api-key: ${DEEPSEEK_API_KEY}
      
      # DeepSeek API Base URL
      base-url: https://api.deepseek.com
      
      chat:
        options:
          # 模型选择：deepseek-v4-pro (或 deepseek-chat)
          model: deepseek-v4-pro
          temperature: 0.7
          max-tokens: 4096

# AgentScope 配置 (可选，根据 starter 版本调整)
# spring.ai.alibaba.agentscope.enabled=true

# 日志配置（由 logback-spring.xml 接管）
logging:
  config: classpath:logback-spring.xml
