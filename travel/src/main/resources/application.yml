spring:
  application:
    name: travel-assistant
  ai:
    # DashScope 模型配置
    dashscope:
      api-key: sk-ws-H.RPXRIPI.jdGH.MEUCIBgGKIg8gCNs_duNqGfIdFa57E2J3x4BlVtkCnnBcvP9AiEAuJGEu9bVXICE0F_FebMfq7HRM0hxFkwMXLzy7SAbC4k
      chat:
        options:
          model: qwen-max

    # MCP Server 配置（本应用作为 MCP Server）
    mcp:
      server:
        name: travel-assistant
        version: 1.0.0
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /stream

      # MCP Client 配置（连接高德地图 MCP）
      client:
        enabled: true
        name: travel-mcp-client
        toolcallback:
          enabled: true
        type: sync
        streamable-http:
          connections:
            amap:
              url: https://mcp.amap.com
              endpoint: /mcp?key=82b2d2a597785ad4248bda8df8da38fa

    # Nacos 注册配置
    alibaba:
      mcp:
        nacos:
          server-addr: 192.168.0.100:8848
          namespace: public
          username: nacos
          password: nacos
          register:
            enabled: true

server:
  port: 4081

logging:
  level:
    com.uid13.travel: INFO
    org.springframework.ai: INFO
    com.alibaba.nacos: INFO
