# Redis 配置
spring:
  data:
    redis:
      host: localhost
      port: 6379
      # password: ENC(加密后的密码)
      # database: 0
      timeout: 5000ms
      # Lettuce 连接池配置
      lettuce:
        pool:
          # 最大连接数
          max-active: 8
          # 最大空闲连接
          max-idle: 8
          # 最小空闲连接
          min-idle: 2
          # 连接耗尽时最大等待时间
          max-wait: 3000ms
